<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%" style="background: transparent;">
    <defs>
        <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.08" />
        </filter>
        
        <linearGradient id="btn-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f97316" />
            <stop offset="100%" stop-color="#ea580c" />
        </linearGradient>

        <linearGradient id="box-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="100%" stop-color="#f8f9fa" />
        </linearGradient>
    </defs>

    <style>
        text {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 变换基准点设置：以元素自身中心为基准 */
        .box-container, .btn-container {
            transform-origin: center center;
            transform-box: fill-box;
        }

        /* 1. 输入框横向展开动画 (总时长6秒) */
        @keyframes boxExpand {
            /* 从缩小且透明的状态开始，横向延展 */
            0% { transform: scaleX(0.4) scaleY(0.7); opacity: 0; animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
            15% { transform: scaleX(1) scaleY(1); opacity: 1; }
            /* 保持展开状态 */
            80% { transform: scaleX(1) scaleY(1); opacity: 1; animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0); }
            /* 平滑缩小消失，准备循环 */
            90%, 100% { transform: scaleX(0.8) scaleY(0.8); opacity: 0; }
        }

        /* 2. 按钮弹出与精准按压动画 (总时长6秒) */
        @keyframes btnPopClick {
            /* 稍微延迟于输入框出现 */
            0%, 5% { transform: scale(0); opacity: 0; animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
            15% { transform: scale(1); opacity: 1; }
            
            /* 第 2 秒时 (2s / 6s = 33.33%) 触发按下动画 */
            33.33% { transform: scale(1); filter: brightness(1); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            36% { transform: scale(0.92); filter: brightness(0.85); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            39% { transform: scale(1); filter: brightness(1); }
            
            /* 保持原状直到退出 */
            80% { transform: scale(1); opacity: 1; animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0); }
            90%, 100% { transform: scale(0.5); opacity: 0; }
        }

        /* 应用 6秒 循环动画 */
        .box-container { animation: boxExpand 6s infinite; }
        .btn-container { animation: btnPopClick 6s infinite; }
    </style>

    <g class="scene">
        <g class="box-container">
            <rect x="70" y="60" width="660" height="76" rx="38" fill="url(#box-gradient)" filter="url(#soft-shadow)" stroke="#f1f5f9" stroke-width="1"/>
        </g>

        <g class="btn-container">
            <rect x="560" y="70" width="150" height="56" rx="28" fill="url(#btn-gradient)" />
            
            <path d="M 585 88 C 585 93, 581 97, 575 98 C 581 99, 585 103, 585 108 C 585 103, 589 99, 595 98 C 589 97, 585 93, 585 88 Z" fill="#ffffff" />
            
            <text x="605" y="104" font-size="17" font-weight="600" fill="#ffffff" letter-spacing="0.5">Generate</text>
        </g>
    </g>
</svg>
